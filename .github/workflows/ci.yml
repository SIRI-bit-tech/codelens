name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: CodeLens-Windows.exe
            build_path: dist/CodeLens.exe
            release_path: dist/CodeLens.exe
          - os: macos-latest
            artifact_name: CodeLens-macOS.zip
            build_path: dist/CodeLens.app
            release_path: dist/CodeLens-macOS.zip
          - os: ubuntu-latest
            artifact_name: CodeLens-Linux
            build_path: dist/CodeLens
            release_path: dist/CodeLens

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller codelens.spec

    - name: Package macOS app (macOS only)
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r CodeLens-macOS.zip CodeLens.app
        cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.build_path }}

    - name: Upload to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ${{ matrix.release_path }}
        asset_name: ${{ matrix.artifact_name }}
        asset_content_type: application/octet-stream
